<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card.lol — Build Your Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-logo">card<span>.lol</span></h1>
      <p class="auth-tagline">Build your profile. Share the link. Stack it to max.</p>
      
      <div id="authForm" class="auth-form">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Login</button>
          <button class="auth-tab" data-tab="signup">Sign Up</button>
        </div>
        
        <form id="loginForm" class="auth-form-inner">
          <input type="text" name="username" placeholder="Username" required>
          <input type="password" name="password" placeholder="Password" required>
          <button type="submit" class="btn btn-primary">Login</button>
        </form>
        
        <form id="signupForm" class="auth-form-inner hidden">
          <input type="text" name="username" placeholder="Username" required>
          <input type="text" name="displayName" placeholder="Display name (optional)">
          <input type="password" name="password" placeholder="Password (6+ chars)" required>
          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
      </div>
      
      <p id="authError" class="auth-error"></p>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
